version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coalition-x-app
    restart: 'always'
    ports:
      - 3000:3000
    logging:
      driver: 'json-file'
      options:
        max-size: '10k'
        max-file: '3'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://coalition:coalition_dev@postgres:5432/coalition_x
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: coalition-x-db
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: coalition_x
      POSTGRES_USER: coalition
      POSTGRES_PASSWORD: coalition_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coalition -d coalition_x"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

