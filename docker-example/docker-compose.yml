version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: 'always'
    ports:
      - 3000:3000
    logging:
      driver: 'json-file'
      options:
        max-size: '10k'
        max-file: '3'
    env_file:
      - .env.local
    depends_on:
      - postgres
  postgres:
    image: postgres:14-alpine
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: 'postgres'
      POSTGRES_USER: 'postgres'
      POSTGRES_HOST_AUTH_METHOD: 'trust'
      DB_HOST: 'host.docker.internal'
volumes:
  postgres-data:
